<svg xmlns="http://www.w3.org/2000/svg" width="960" height="200" viewBox="0 0 960 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f6e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1933AC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1f6e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="50%">
      <stop offset="0%" style="stop-color:#2a47d4;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0f1f6e;stop-opacity:0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="200" fill="url(#bg)" rx="12"/>
  <rect width="960" height="200" fill="url(#glow)" rx="12"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="40" x2="960" y2="40"/>
    <line x1="0" y1="80" x2="960" y2="80"/>
    <line x1="0" y1="120" x2="960" y2="120"/>
    <line x1="0" y1="160" x2="960" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
    <line x1="800" y1="0" x2="800" y2="200"/>
  </g>

  <!-- Teal accent glow blob -->
  <ellipse cx="780" cy="60" rx="180" ry="80" fill="#00dba3" opacity="0.08" filter="url(#blur)"/>

  <!-- DQE wordmark -->
  <text x="60" y="78" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="900" fill="#ffffff" letter-spacing="-2">DQE</text>
  <text x="148" y="78" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="900" fill="#00dba3">.</text>

  <!-- Tagline -->
  <text x="60" y="108" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#ffffff" opacity="0.55" letter-spacing="3" font-weight="400">DATA QUALITY FOR CLAUDE CODE</text>

  <!-- Plugin name -->
  <text x="60" y="152" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff" opacity="0.9">dqe-quality</text>

  <!-- Right side: stats pills -->
  <g transform="translate(580, 72)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="130" height="32" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
    <text x="65" y="21" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#00dba3" font-weight="700" text-anchor="middle">1 skill · 6 dimensions</text>
    <!-- Pill 2 -->
    <rect x="140" y="0" width="130" height="32" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
    <text x="205" y="21" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#00dba3" font-weight="700" text-anchor="middle">3 HTML reports</text>
    <!-- Pill 3 -->
    <rect x="0" y="46" width="130" height="32" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
    <text x="65" y="67" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.7" text-anchor="middle">EN · FR · DE · ES</text>
    <!-- Pill 4 -->
    <rect x="140" y="46" width="130" height="32" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
    <text x="205" y="67" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.7" text-anchor="middle">Zero dependencies</text>
  </g>
</svg>
